version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - AI_DEPTH=6
      - AI_TIME_LIMIT=3.0
      - STORAGE_DIR=/app/data/long_term
    volumes:
      - game_data:/app/data

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  game_data:
